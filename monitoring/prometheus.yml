global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'orchestrator'
    static_configs:
      - targets: ['orchestrator:8000']
  
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8080']
  
  - job_name: 'vuln-database'
    static_configs:
      - targets: ['vuln-database:8001']
  
  - job_name: 'compliance-mapper'
    static_configs:
      - targets: ['compliance-mapper:8002']
  
  - job_name: 'dashboard'
    static_configs:
      - targets: ['dashboard:5000']