global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'security-platform'

# Load alert rules
rule_files:
  - "alerts.yml"

scrape_configs:
  # Orchestrator - Main scanner (WORKING)
  - job_name: 'orchestrator'
    static_configs:
      - targets: ['orchestrator:8000']
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s

  # API Gateway
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8080']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # Dashboard
  - job_name: 'dashboard'
    static_configs:
      - targets: ['dashboard:5000']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # PostgreSQL Exporter
  - job_name: 'postgres'
    static_configs:
      - targets: ['security-postgres-exporter:9187']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Redis Exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['security-redis-exporter:9121']
    metrics_path: '/metrics'
    scrape_interval: 30s