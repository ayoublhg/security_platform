apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: securityscans.security.platform.io
spec:
  group: security.platform.io
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["repository"]
              properties:
                repository:
                  type: string
                  pattern: '^https://(github|gitlab)\.com/.*'
                branch:
                  type: string
                  default: "main"
                scanTypes:
                  type: array
                  items:
                    type: string
                    enum: ["sast", "sca", "secrets", "container", "iac", "dast"]
                  default: ["sast", "sca", "secrets"]
                schedule:
                  type: string
                  pattern: '^(\d+|\*)(/\d+)?(\s+(\d+|\*)(/\d+)?){4}$'
                retention:
                  type: object
                  properties:
                    days:
                      type: integer
                      default: 90
                    reports:
                      type: integer
                      default: 10
                notifications:
                  type: object
                  properties:
                    slack:
                      type: string
                    teams:
                      type: string
                    email:
                      type: string
                compliance:
                  type: object
                  properties:
                    frameworks:
                      type: array
                      items:
                        type: string
                        enum: ["SOC2", "PCI-DSS", "HIPAA", "ISO27001", "NIST"]
      additionalPrinterColumns:
        - name: Repository
          type: string
          jsonPath: .spec.repository
        - name: Status
          type: string
          jsonPath: .status.phase
        - name: Last Scan
          type: date
          jsonPath: .status.lastScanTime
        - name: Critical
          type: integer
          jsonPath: .status.summary.critical
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: securityscans
    singular: securityscan
    kind: SecurityScan
    shortNames:
      - secscan