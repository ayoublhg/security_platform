version: '3.8'

services:
  # ============ SERVICES DE BASE ============
  postgres:
    image: postgres:15-alpine
    container_name: security-postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-security_platform}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./shared/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - security-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: security-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - security-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============ EXPORTERS POUR MONITORING ============
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: security-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-secure_password}@postgres:5432/${POSTGRES_DB:-security_platform}?sslmode=disable"
    ports:
      - "9187:9187"
    networks:
      - security-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: security-redis-exporter
    environment:
      REDIS_ADDR: "redis:6379"
    ports:
      - "9121:9121"
    networks:
      - security-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ============ SERVICES PLATEFORME ============
  orchestrator:
    build: ./platform/orchestrator
    container_name: security-orchestrator
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secure_password}
      - POSTGRES_DB=${POSTGRES_DB:-security_platform}
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITLAB_TOKEN=${GITLAB_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./reports:/app/reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - security-network
    restart: unless-stopped

  api-gateway:
    build: ./platform/api-gateway
    container_name: security-api-gateway
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET:-dev_secret_key_change_in_production}
      - REDIS_HOST=redis
    depends_on:
      - redis
      - orchestrator
    networks:
      - security-network
    restart: unless-stopped

  # ============ SERVICES SÉCURITÉ ============
  vuln-database:
    build: ./security/vuln-database
    container_name: security-vuln-db
    ports:
      - "8001:8001"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secure_password}
      - POSTGRES_DB=${POSTGRES_DB:-security_platform}
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - NVD_API_KEY=${NVD_API_KEY}
    depends_on:
      - postgres
      - redis
    networks:
      - security-network
    restart: unless-stopped

  compliance-mapper:
    build: ./security/compliance-mapper
    container_name: security-compliance
    ports:
      - "8002:8002"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secure_password}
      - POSTGRES_DB=${POSTGRES_DB:-security_platform}
      - POSTGRES_HOST=postgres
    depends_on:
      - postgres
    networks:
      - security-network
    restart: unless-stopped

  auto-remediation:
    build: ./security/auto-remediation
    container_name: security-remediation
    ports:
      - "8003:8003"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - JIRA_URL=${JIRA_URL}
      - JIRA_USER=${JIRA_USER}
      - JIRA_TOKEN=${JIRA_TOKEN}
      - SLACK_TOKEN=${SLACK_TOKEN}
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis
    networks:
      - security-network
    restart: unless-stopped

  # ============ DASHBOARD ============
  dashboard:
    build: ./shared/dashboard
    container_name: security-dashboard
    ports:
      - "5000:5000"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secure_password}
      - POSTGRES_DB=${POSTGRES_DB:-security_platform}
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - ORCHESTRATOR_API=http://orchestrator:8000
    depends_on:
      - postgres
      - orchestrator
    networks:
      - security-network
    restart: unless-stopped

  # ============ MONITORING ============
  prometheus:
    image: prom/prometheus:latest
    container_name: security-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - security-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: security-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - security-network
    restart: unless-stopped

networks:
  security-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data: